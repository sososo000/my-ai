<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💩 싸기 마스터 2인용 </title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Dongle:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Jua', 'Dongle', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffe1f3 0%, #b8f3ff 100%);
        }

        .game-container {
            background: rgba(255, 255, 255, 0.97);
            border-radius: 32px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(43, 38, 68, 0.22), inset 0 0 0 3px #fff, inset 0 0 0 6px #ff7eb3;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .game-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #ff7eb3, #ff9a3c, #ffe156, #7bffcb, #78d6ff);
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #ff7eb3, #ff9a3c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 800;
        }

        .subtitle {
            color: #2b2644;
            margin-bottom: 15px;
            font-size: 1rem;
            opacity: 0.75;
            font-weight: 600;
        }

        .players-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
            gap: 15px;
        }

        .player-info {
            flex: 1;
            padding: 12px 15px;
            border-radius: 10px;
            border: 3px solid;
        }

        .player-info.p1 {
            background: rgba(255, 126, 179, 0.1);
            border-color: #ff7eb3;
        }

        .player-info.p2 {
            background: rgba(123, 255, 203, 0.1);
            border-color: #7bffcb;
        }

        .player-info h3 {
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        .player-info.p1 h3 { color: #ff7eb3; }
        .player-info.p2 h3 { color: #5d8f66; }

        .player-stats {
            display: flex;
            flex-direction: column;
            gap: 5px;
            font-size: 0.9rem;
            color: #2b2644;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .belly-bar {
            width: 80px;
            height: 14px;
            background: #f0f0f0;
            border-radius: 7px;
            overflow: hidden;
            border: 2px solid #ff7eb3;
            display: inline-block;
        }

        .belly-fill {
            height: 100%;
            transition: width 0.3s;
        }

        .p1 .belly-fill { background: linear-gradient(90deg, #ff7eb3, #ff9a3c); }
        .p2 .belly-fill { background: linear-gradient(90deg, #7bffcb, #78d6ff); }

        .timer-box {
            background: linear-gradient(135deg, #fff9e0, #fff3c4);
            padding: 12px 25px;
            border-radius: 16px;
            border: 3px solid #ffe156;
            box-shadow: 0 4px 0 #c2a830;
        }

        .timer-box .time {
            font-size: 2rem;
            font-weight: bold;
            color: #2b2644;
        }

        .timer-box .label {
            font-size: 0.8rem;
            color: #2b2644;
            opacity: 0.7;
        }

        #game-canvas {
            border: 4px solid #ff7eb3;
            border-radius: 16px;
            display: block;
            margin: 10px auto 0;
            box-shadow: 0 8px 0 rgba(255, 126, 179, 0.3);
        }

        .controls {
            margin-top: 12px;
            display: flex;
            justify-content: space-around;
            gap: 10px;
        }

        .control-box {
            flex: 1;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 0.8rem;
        }

        .control-box.p1 {
            background: rgba(255, 126, 179, 0.12);
            border: 2px solid #ff7eb3;
            color: #ff7eb3;
        }

        .control-box.p2 {
            background: rgba(123, 255, 203, 0.12);
            border: 2px solid #7bffcb;
            color: #5d8f66;
        }

        .control-box h4 {
            margin-bottom: 5px;
        }

        #start-btn, #restart-btn {
            margin-top: 15px;
            padding: 14px 40px;
            font-size: 1.2rem;
            font-family: 'Jua', sans-serif;
            background: linear-gradient(180deg, #7bffcb, #2fd38f);
            color: #2b2644;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            transition: transform 0.2s;
            font-weight: 800;
            box-shadow: 0 5px 0 #17a869, 0 6px 14px rgba(47, 211, 143, 0.35);
        }

        #start-btn:hover, #restart-btn:hover {
            transform: scale(1.05);
        }

        .game-wrapper {
            position: relative;
            display: inline-block;
        }

        #game-over {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(43, 38, 68, 0.92);
            color: white;
            border-radius: 16px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #game-over.show {
            display: flex;
        }

        #game-over h2 {
            font-size: 2rem;
            margin-bottom: 10px;
            font-family: 'Jua', sans-serif;
        }

        .result-box {
            display: flex;
            gap: 40px;
            margin: 15px 0;
        }

        .player-result {
            text-align: center;
            padding: 15px 25px;
            border-radius: 15px;
            border: 3px solid;
        }

        .player-result.p1 {
            border-color: #ff7eb3;
            background: rgba(255, 126, 179, 0.2);
        }

        .player-result.p2 {
            border-color: #7bffcb;
            background: rgba(123, 255, 203, 0.2);
        }

        .player-result .rank {
            font-size: 2.5rem;
            margin: 8px 0;
        }

        .player-result .score {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .winner-announce {
            font-size: 1.8rem;
            margin: 15px 0;
            padding: 10px 30px;
            background: rgba(255, 225, 86, 0.3);
            border-radius: 10px;
            font-family: 'Jua', sans-serif;
        }

        .tie-text { color: #ffe156; }
        .p1-win { color: #ff7eb3; }
        .p2-win { color: #7bffcb; }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>💩 똥싸기 마스터 2인용 💩</h1>
        <p class="subtitle">둘이서 변기争奪! 누가 더 많이 싸나?</p>
        
        <div class="players-status">
            <div class="player-info p1">
                <h3>🔴 Player 1</h3>
                <div class="player-stats">
                    <div class="stat-row">
                        <span>점수:</span>
                        <span id="p1-score" style="color:#FF6347; font-weight:bold;">0</span>
                    </div>
                    <div class="stat-row">
                        <span>배:</span>
                        <div class="belly-bar">
                            <div class="belly-fill" id="p1-belly"></div>
                        </div>
                    </div>
                    <div class="stat-row">
                        <span>콤보:</span>
                        <span id="p1-combo">0</span>
                    </div>
                </div>
            </div>

            <div class="timer-box">
                <div class="label">남은 시간</div>
                <div class="time" id="timer">60</div>
            </div>

            <div class="player-info p2">
                <h3>🔵 Player 2</h3>
                <div class="player-stats">
                    <div class="stat-row">
                        <span>점수:</span>
                        <span id="p2-score" style="color:#1E90FF; font-weight:bold;">0</span>
                    </div>
                    <div class="stat-row">
                        <span>배:</span>
                        <div class="belly-bar">
                            <div class="belly-fill" id="p2-belly"></div>
                        </div>
                    </div>
                    <div class="stat-row">
                        <span>콤보:</span>
                        <span id="p2-combo">0</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="game-wrapper">
            <canvas id="game-canvas" width="650" height="420"></canvas>
            <div id="game-over">
                <h2>🚽 게임 종료! 🚽</h2>
                <div class="winner-announce" id="winner-text"></div>
                <div class="result-box">
                    <div class="player-result p1">
                        <div style="font-size:1.2rem;">🔴 Player 1</div>
                        <div class="rank" id="p1-rank"></div>
                        <div class="score"><span id="p1-final-score">0</span>점</div>
                        <div style="font-size:0.9rem;">성공률: <span id="p1-accuracy">0</span>%</div>
                        <div style="font-size:0.9rem;">최대콤보: <span id="p1-max-combo">0</span></div>
                    </div>
                    <div class="player-result p2">
                        <div style="font-size:1.2rem;">🔵 Player 2</div>
                        <div class="rank" id="p2-rank"></div>
                        <div class="score"><span id="p2-final-score">0</span>점</div>
                        <div style="font-size:0.9rem;">성공률: <span id="p2-accuracy">0</span>%</div>
                        <div style="font-size:0.9rem;">최대콤보: <span id="p2-max-combo">0</span></div>
                    </div>
                </div>
                <button id="restart-btn">다시 싸기! 🔄</button>
            </div>
        </div>

        <div class="controls">
            <div class="control-box p1">
                <h4>🔴 Player 1</h4>
                <button style="background:none;border:none;font-size:0.85rem;">↑←↓→ 이동</button><br>
                <button style="background:none;border:none;font-size:0.85rem;">Space = 똥싸기</button>
            </div>
            <div class="control-box p2">
                <h4>🔵 Player 2</h4>
                <button style="background:none;border:none;font-size:0.85rem;">WASD 이동</button><br>
                <button style="background:none;border:none;font-size:0.85rem;">좌측 Shift = 똥싸기</button>
            </div>
        </div>

        <button id="start-btn">게임 시작! 🎮</button>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const gameOverDiv = document.getElementById('game-over');

        // UI elements
        const ui = {
            p1: {
                score: document.getElementById('p1-score'),
                belly: document.getElementById('p1-belly'),
                combo: document.getElementById('p1-combo'),
                finalScore: document.getElementById('p1-final-score'),
                accuracy: document.getElementById('p1-accuracy'),
                maxCombo: document.getElementById('p1-max-combo'),
                rank: document.getElementById('p1-rank')
            },
            p2: {
                score: document.getElementById('p2-score'),
                belly: document.getElementById('p2-belly'),
                combo: document.getElementById('p2-combo'),
                finalScore: document.getElementById('p2-final-score'),
                accuracy: document.getElementById('p2-accuracy'),
                maxCombo: document.getElementById('p2-max-combo'),
                rank: document.getElementById('p2-rank')
            },
            timer: document.getElementById('timer'),
            winnerText: document.getElementById('winner-text')
        };

        let game, players, toilets, foods, particles, floatingTexts, keys;

        function initGame() {
            game = {
                running: false,
                timeLeft: 60,
                lastTime: 0
            };

            players = [
                {
                    id: 1,
                    x: canvas.width * 0.25,
                    y: canvas.height / 2,
                    speed: 3.5,
                    color: '#ff7eb3',
                    emoji: '🦦',
                    walkEmoji: '',
                    score: 0,
                    belly: 0,
                    combo: 0,
                    maxCombo: 0,
                    totalPoops: 0,
                    toiletPoops: 0,
                    isPooping: false,
                    poopTimer: 0,
                    direction: 1
                },
                {
                    id: 2,
                    x: canvas.width * 0.75,
                    y: canvas.height / 2,
                    speed: 3.5,
                    color: '#7bffcb',
                    emoji: '🦦',
                    walkEmoji: '',
                    score: 0,
                    belly: 0,
                    combo: 0,
                    maxCombo: 0,
                    totalPoops: 0,
                    toiletPoops: 0,
                    isPooping: false,
                    poopTimer: 0,
                    direction: 1
                }
            ];

            toilets = [];
            foods = [];
            particles = [];
            floatingTexts = [];
            keys = {};
        }

        initGame();

        // P1: Arrow keys + Space
        // P2: WASD + Shift(Left)
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            
            // P1 poop (Space)
            if (e.code === 'Space' && game.running) {
                e.preventDefault();
                tryPoop(0);
            }
            // P2 poop (좌측 Shift)
            else if (e.code === 'ShiftLeft' && game.running) {
                e.preventDefault();
                tryPoop(1);
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        function startGame() {
            initGame();
            game.running = true;
            game.lastTime = Date.now();

            // Spawn toilets (more for 2 players)
            for (let i = 0; i < 5; i++) spawnToilet();
            for (let i = 0; i < 3; i++) spawnFood();

            startBtn.style.display = 'none';
            gameOverDiv.classList.remove('show');
            updateUI();
            requestAnimationFrame(gameLoop);
        }

        function spawnToilet() {
            toilets.push({
                x: 60 + Math.random() * (canvas.width - 120),
                y: 50 + Math.random() * (canvas.height - 120),
                width: 50,
                height: 60,
                occupied: 0 // occupied by player id (0 or 1)
            });
        }

        function spawnFood() {
            const foodTypes = ['🍔', '🍕', '🌮', '🍩', '🍪', '🍦', '🌭', '🍗'];
            foods.push({
                x: 40 + Math.random() * (canvas.width - 80),
                y: 40 + Math.random() * (canvas.height - 100),
                width: 30,
                height: 30,
                type: foodTypes[Math.floor(Math.random() * foodTypes.length)]
            });
        }

        function tryPoop(playerIdx) {
            const p = players[playerIdx];
            if (p.belly <= 0 || p.isPooping) return;

            p.isPooping = true;
            p.poopTimer = 30;
            p.totalPoops++;

            let onToilet = false;
            let toiletDist = Infinity;
            for (let toilet of toilets) {
                let dx = p.x - toilet.x;
                let dy = p.y - toilet.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 50 && dist < toiletDist) {
                    onToilet = true;
                    toiletDist = dist;
                }
            }

            let points = 10;
            if (onToilet) {
                p.combo++;
                if (p.combo > p.maxCombo) p.maxCombo = p.combo;
                p.toiletPoops++;
                points = 30 * p.combo;
                addFloatingText(p.x, p.y - 35, `+${points} 🎯`, p.color);
                for (let i = 0; i < 5; i++) {
                    particles.push({
                        x: p.x, y: p.y,
                        vx: (Math.random() - 0.5) * 6,
                        vy: -Math.random() * 5 - 2,
                        life: 40, emoji: '✨'
                    });
                }
            } else {
                p.combo = 0;
                addFloatingText(p.x, p.y - 35, `+${points}`, p.color);
            }

            p.score += points;
            p.belly = Math.max(0, p.belly - 30);

            for (let i = 0; i < 3; i++) {
                particles.push({
                    x: p.x, y: p.y + 20,
                    vx: (Math.random() - 0.5) * 4,
                    vy: Math.random() * 2,
                    life: 50, emoji: '💩'
                });
            }

            updateUI();
        }

        function addFloatingText(x, y, text, color) {
            floatingTexts.push({ x, y, text, color, life: 60 });
        }

        function checkCollision(a, b) {
            return Math.abs(a.x - b.x) < 28 && Math.abs(a.y - b.y) < 28;
        }

        function updatePlayer(playerIdx) {
            const p = players[playerIdx];
            let moving = false;

            if (playerIdx === 0) {
                // P1: Arrow keys
                if (keys['ArrowLeft']) { p.x -= p.speed; p.direction = -1; moving = true; }
                if (keys['ArrowRight']) { p.x += p.speed; p.direction = 1; moving = true; }
                if (keys['ArrowUp']) { p.y -= p.speed; moving = true; }
                if (keys['ArrowDown']) { p.y += p.speed; moving = true; }
            } else {
                // P2: WASD
                if (keys['KeyA']) { p.x -= p.speed; p.direction = -1; moving = true; }
                if (keys['KeyD']) { p.x += p.speed; p.direction = 1; moving = true; }
                if (keys['KeyW']) { p.y -= p.speed; moving = true; }
                if (keys['KeyS']) { p.y += p.speed; moving = true; }
            }

            // Boundaries
            p.x = Math.max(20, Math.min(canvas.width - 20, p.x));
            p.y = Math.max(35, Math.min(canvas.height - 25, p.y));

            // Poop timer
            if (p.isPooping) {
                p.poopTimer--;
                if (p.poopTimer <= 0) p.isPooping = false;
            }

            // Eat food
            for (let i = foods.length - 1; i >= 0; i--) {
                if (checkCollision(p, foods[i])) {
                    p.belly = Math.min(100, p.belly + 20);
                    addFloatingText(foods[i].x, foods[i].y - 20, '🍴+', p.color);
                    for (let j = 0; j < 4; j++) {
                        particles.push({
                            x: foods[i].x, y: foods[i].y,
                            vx: (Math.random() - 0.5) * 5,
                            vy: (Math.random() - 0.5) * 5,
                            life: 30, emoji: foods[i].type
                        });
                    }
                    foods.splice(i, 1);
                    setTimeout(() => spawnFood(), 1500);
                }
            }
        }

        function update() {
            let now = Date.now();
            let dt = (now - game.lastTime) / 1000;
            game.lastTime = now;

            game.timeLeft -= dt;
            if (game.timeLeft <= 0) {
                endGame();
                return;
            }

            updatePlayer(0);
            updatePlayer(1);

            // Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                particles[i].vy += 0.2;
                particles[i].life--;
                if (particles[i].life <= 0) particles.splice(i, 1);
            }

            // Floating texts
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                floatingTexts[i].y -= 1.5;
                floatingTexts[i].life--;
                if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
            }

            updateUI();
        }

        function updateUI() {
            ui.p1.score.textContent = players[0].score;
            ui.p2.score.textContent = players[1].score;
            ui.p1.belly.style.width = players[0].belly + '%';
            ui.p2.belly.style.width = players[1].belly + '%';
            ui.p1.combo.textContent = players[0].combo > 1 ? `${players[0].combo}x` : players[0].combo;
            ui.p2.combo.textContent = players[1].combo > 1 ? `${players[1].combo}x` : players[1].combo;
            ui.timer.textContent = Math.ceil(game.timeLeft);
        }

        function draw() {
            // Background - bathroom tiles
            ctx.fillStyle = '#E8D5B7';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = '#D4C4A8';
            ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += 40) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += 40) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // Toilets
            ctx.font = '48px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            for (let toilet of toilets) {
                ctx.fillText('🚽', toilet.x, toilet.y);
            }

            // Foods
            ctx.font = '26px Arial';
            for (let food of foods) {
                ctx.fillText(food.type, food.x, food.y);
            }

            // Particles
            for (let p of particles) {
                ctx.globalAlpha = p.life / 50;
                ctx.font = '18px Arial';
                ctx.fillText(p.emoji, p.x, p.y);
            }
            ctx.globalAlpha = 1;

            // Floating texts
            for (let ft of floatingTexts) {
                ctx.globalAlpha = ft.life / 60;
                ctx.fillStyle = ft.color;
                ctx.font = 'bold 16px Arial';
                ctx.fillText(ft.text, ft.x, ft.y);
            }
            ctx.globalAlpha = 1;

            // Players
            for (let p of players) {
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.scale(p.direction, 1);

                // Shadow
                ctx.globalAlpha = 0.3;
                ctx.font = '42px Arial';
                ctx.fillText(p.emoji, 0, 22);
                ctx.globalAlpha = 1;

                // Player
                if (p.isPooping) {
                    ctx.fillText(p.emoji, 0, 0);
                    if (p.poopTimer % 5 === 0) {
                        ctx.font = '22px Arial';
                        ctx.fillText('💩', -p.direction * 12, 18);
                    }
                } else {
                    ctx.fillText(p.walkEmoji, 0, 0);
                }

                // Number indicator
                ctx.scale(p.direction, 1); // reset scale for number
                ctx.font = 'bold 14px Arial';
                ctx.fillStyle = p.color;
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.strokeText(`P${p.id}`, 0, -30);
                ctx.fillText(`P${p.id}`, 0, -30);

                // Belly indicator
                if (p.belly > 50) {
                    ctx.font = '14px Arial';
                    ctx.fillText(p.belly > 80 ? '🤢' : '😣', 0, -18);
                }

                ctx.restore();
            }

            // Combo displays (bottom corners)
            if (players[0].combo > 1) {
                ctx.fillStyle = players[0].color;
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'left';
                ctx.fillText(`${players[0].combo}x 🔥`, 10, canvas.height - 15);
            }
            if (players[1].combo > 1) {
                ctx.fillStyle = players[1].color;
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'right';
                ctx.fillText(`🔥 ${players[1].combo}x`, canvas.width - 10, canvas.height - 15);
            }
        }

        function gameLoop() {
            if (!game.running) return;
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function getRank(score) {
            if (score >= 400) return '👑 똥마왕';
            if (score >= 250) return '💎 똥VIP';
            if (score >= 120) return '🥇 똥고수';
            if (score >= 50) return '🥈 보통';
            return '🥉 초보';
        }

        function endGame() {
            game.running = false;

            const p1 = players[0];
            const p2 = players[1];

            // Fill results
            ui.p1.finalScore.textContent = p1.score;
            ui.p2.finalScore.textContent = p2.score;
            ui.p1.accuracy.textContent = p1.totalPoops > 0 ? Math.round((p1.toiletPoops / p1.totalPoops) * 100) : 0;
            ui.p2.accuracy.textContent = p2.totalPoops > 0 ? Math.round((p2.toiletPoops / p2.totalPoops) * 100) : 0;
            ui.p1.maxCombo.textContent = p1.maxCombo;
            ui.p2.maxCombo.textContent = p2.maxCombo;
            ui.p1.rank.textContent = getRank(p1.score);
            ui.p2.rank.textContent = getRank(p2.score);

            // Winner announcement
            if (p1.score > p2.score) {
                ui.winnerText.textContent = `🔴 Player 1 승리! 🏆`;
                ui.winnerText.className = 'winner-announce p1-win';
            } else if (p2.score > p1.score) {
                ui.winnerText.textContent = `🔵 Player 2 승리! 🏆`;
                ui.winnerText.className = 'winner-announce p2-win';
            } else {
                ui.winnerText.textContent = `🤝 무승부!`;
                ui.winnerText.className = 'winner-announce tie-text';
            }

            gameOverDiv.classList.add('show');
        }

        // Initial screen
        ctx.fillStyle = '#E8D5B7';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#8B4513';
        ctx.font = 'bold 28px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('💩 똥싸기 마스터 2인용 💩', canvas.width / 2, canvas.height / 2 - 20);
        ctx.font = '18px Arial';
        ctx.fillText('시작 버튼을 눌러주세요!', canvas.width / 2, canvas.height / 2 + 20);
    </script>
</body>
</html>
