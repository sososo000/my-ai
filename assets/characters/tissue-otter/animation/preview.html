<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tissue Otter Animation Preview</title>
<style>
  :root { color-scheme: light; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #eef5f8; color: #222; }
  main { display: grid; gap: 14px; justify-items: center; }
  .stage { width: min(78vw, 520px); aspect-ratio: 1; display: grid; place-items: center; background: #f9fcfd; border: 1px solid #d7e4e9; border-radius: 8px; }
  img { width: 82%; image-rendering: auto; }
  h1 { margin: 0; font-size: 20px; font-weight: 700; }
  p { margin: 0; font-size: 14px; color: #52636b; }
</style>
</head>
<body>
<main>
  <h1>휴지 슛! 콧물 쏙! 캐릭터 모션 루프</h1>
  <div class="stage"><img src="tissue-otter-gameplay-loop.gif" alt="Tissue otter animation loop"></div>
  <p>Perfect 루프와 Miss 루프를 이어붙인 게임 플레이 감정선 프리뷰</p>
</main>
</body>
</html>
