<!--휴지 슛! 콧물 쏙! v3-->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>휴지 슛! 콧물 쏙!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Dongle:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --brand-pink:#FF7EB3;
  --brand-orange:#FF9A3C;
  --brand-sky:#78D6FF;
  --brand-mint:#7BFFCB;
  --brand-yellow:#FFE156;
  --brand-dark:#2B2644;
  --bg-top:#FFE1F3;
  --bg-bot:#B8F3FF;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:linear-gradient(180deg,var(--bg-top) 0%,var(--bg-bot) 100%);
  font-family:'Jua','Dongle',-apple-system,sans-serif;
  touch-action:none;user-select:none;-webkit-user-select:none;
  cursor:default;
}
/* 전체에 떠있는 배경 파티클 장식 */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(circle at 10% 20%, rgba(255,221,243,.7) 0 8px, transparent 9px),
    radial-gradient(circle at 80% 35%, rgba(120,214,255,.5) 0 6px, transparent 7px),
    radial-gradient(circle at 55% 80%, rgba(123,255,203,.6) 0 7px, transparent 8px),
    radial-gradient(circle at 25% 70%, rgba(255,225,86,.5) 0 5px, transparent 6px),
    radial-gradient(circle at 90% 90%, rgba(255,126,179,.5) 0 6px, transparent 7px);
  animation:floatDeco 12s linear infinite alternate;
}
@keyframes floatDeco{from{transform:translateY(0)}to{transform:translateY(-20px)}}

#wrapper{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:1}
canvas{display:block;max-width:100vw;max-height:100vh;image-rendering:auto}

/* === 로비 패널 (귀여운 브랜드 UI) === */
#lobby{
  position:absolute;top:0;left:0;width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(180deg, rgba(255,225,243,.55), rgba(184,243,255,.55));
  backdrop-filter:blur(4px);
  z-index:10;transition:opacity .4s;
}
#lobby.hidden{opacity:0;pointer-events:none}

.lobby-box{
  width:min(92vw,560px);
  background:rgba(255,255,255,.97);
  border-radius:32px;
  padding:26px 26px 20px;
  box-shadow:
    0 20px 0 -5px rgba(255,126,179,.2),
    0 28px 60px rgba(43,38,68,.22),
    inset 0 0 0 3px #fff,
    inset 0 0 0 6px var(--brand-pink);
  display:flex;flex-direction:column;gap:14px;
  max-height:90vh;
  position:relative;
  overflow:hidden;
}
/* 로비 꼭대기 장식 (무지개 띠) */
.lobby-box::before{
  content:'';position:absolute;top:0;left:0;right:0;height:6px;
  background:linear-gradient(90deg,var(--brand-pink),var(--brand-orange),var(--brand-yellow),var(--brand-mint),var(--brand-sky));
  border-radius:32px 32px 0 0;
}

.lobby-header{
  display:flex;align-items:center;justify-content:center;gap:10px;
  margin-bottom:2px;
}
.lobby-emoji{font-size:44px;filter:drop-shadow(0 3px 0 rgba(0,0,0,.1));animation:bob 2s ease-in-out infinite}
@keyframes bob{50%{transform:translateY(-5px) rotate(-5deg)}}
.lobby-title{
  text-align:center;font-weight:800;
  font-size:42px;line-height:1;
  background:linear-gradient(90deg,var(--brand-pink),var(--brand-orange));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 3px 0 rgba(255,126,179,.18);
  letter-spacing:1px;
}
.lobby-subtitle{
  text-align:center;color:var(--brand-dark);font-weight:600;font-size:16px;
  opacity:.75;margin-top:-6px;letter-spacing:.5px;
}

.player-list{
  flex:1;min-height:110px;max-height:260px;overflow-y:auto;
  background:linear-gradient(180deg,#FFF4FA,#F0F8FF);
  border:2px dashed var(--brand-sky);
  border-radius:18px;padding:10px;
  display:flex;flex-direction:column;gap:8px;
}
.player-item{
  display:flex;align-items:center;justify-content:space-between;
  background:#fff;border-radius:14px;padding:10px 14px;
  border-left:6px solid var(--brand-sky);
  box-shadow:0 3px 0 rgba(120,214,255,.25);
  animation:popIn .35s cubic-bezier(.5,1.8,.5,1);
  font-size:17px;color:var(--brand-dark);
}
@keyframes popIn{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
.player-item.top{border-left-color:var(--brand-yellow);background:#FFFBE6;box-shadow:0 3px 0 rgba(255,225,86,.4)}
.player-item:nth-child(2){border-left-color:var(--brand-pink)}
.player-item:nth-child(3){border-left-color:var(--brand-mint)}
.player-num{
  font-weight:800;color:#fff;
  background:linear-gradient(135deg,var(--brand-orange),var(--brand-pink));
  border-radius:50%;width:30px;height:30px;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;margin-right:10px;
  box-shadow:0 2px 0 rgba(0,0,0,.15);
}
.player-name{font-weight:700;flex:1;word-break:break-word;letter-spacing:.3px}
.player-x{
  background:#fff;color:var(--brand-pink);border:2px solid var(--brand-pink);border-radius:50%;
  width:28px;height:28px;font-size:16px;font-weight:bold;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:transform .15s;
}
.player-x:hover{background:var(--brand-pink);color:#fff;transform:rotate(90deg) scale(1.1)}

.input-row{display:flex;gap:8px;align-items:stretch}
#nameInput{
  flex:1;border:3px solid var(--brand-sky);border-radius:16px;
  padding:14px 16px;font-size:18px;font-weight:700;
  font-family:'Jua',sans-serif;
  outline:none;background:#fff;color:var(--brand-dark);
  touch-action:none;
}
#nameInput:focus{
  border-color:var(--brand-pink);
  box-shadow:0 0 0 4px rgba(255,126,179,.2);
}
#nameInput::placeholder{color:#BFB8D6;font-weight:500}
#addBtn{
  background:linear-gradient(180deg,var(--brand-orange),#FF6A1A);
  color:#fff;border:none;border-radius:16px;
  font-size:30px;font-weight:800;
  width:60px;cursor:pointer;
  box-shadow:0 5px 0 #C94E0E,0 6px 12px rgba(255,106,26,.3);
  transition:transform .1s;font-family:'Jua',sans-serif;
}
#addBtn:active{transform:translateY(3px);box-shadow:0 2px 0 #C94E0E}
#addBtn:disabled{opacity:.4;cursor:not-allowed}

.start-row{display:flex;gap:8px}
#startBtn{
  flex:1;
  background:linear-gradient(180deg,var(--brand-mint),#2FD38F);
  color:var(--brand-dark);border:none;border-radius:18px;
  padding:16px;font-size:22px;font-weight:800;cursor:pointer;
  font-family:'Jua',sans-serif;letter-spacing:.5px;
  box-shadow:0 5px 0 #17A869,0 6px 14px rgba(47,211,143,.35);
  transition:transform .1s;
}
#startBtn:active{transform:translateY(3px);box-shadow:0 2px 0 #17A869}
#startBtn:disabled{opacity:.35;cursor:not-allowed}
#clearBtn{
  background:#fff;color:var(--brand-dark);
  border:2.5px solid var(--brand-sky);border-radius:18px;
  padding:0 22px;font-weight:700;font-size:15px;cursor:pointer;
  font-family:'Jua',sans-serif;
  transition:background .15s;
}
#clearBtn:hover{background:#F0F8FF}

.hint{
  font-size:13px;color:#9890B5;text-align:center;font-weight:500;
}

/* === 오버레이 (턴, 결과) === */
.overlay{
  position:absolute;top:0;left:0;width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(circle at 50% 40%, rgba(255,225,243,.85), rgba(43,38,68,.82));
  z-index:10;color:#fff;text-align:center;padding:24px;
  transition:opacity .3s;
}
.overlay.hidden{opacity:0;pointer-events:none}

#turnOverlay .turn-card{
  background:rgba(255,255,255,.98);
  border-radius:30px;padding:30px 28px;
  box-shadow:0 20px 60px rgba(0,0,0,.35), inset 0 0 0 4px var(--brand-pink);
  max-width:min(92vw,480px);width:100%;
  text-align:center;
}

#boardOverlay .board-card{
  background:rgba(255,255,255,.98);
  border-radius:30px;padding:28px 24px;
  box-shadow:0 20px 60px rgba(0,0,0,.4), inset 0 0 0 4px var(--brand-yellow);
  width:min(92vw,520px);
}
.board-title{
  font-size:36px;font-weight:800;
  background:linear-gradient(90deg,var(--brand-yellow),var(--brand-orange));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  margin-bottom:16px;letter-spacing:1px;
}
#boardList{display:flex;flex-direction:column;gap:10px}

.board-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-radius:16px;font-size:18px;
  background:#F8F5FF;color:var(--brand-dark);
  border-left:6px solid var(--brand-sky);
  box-shadow:0 3px 0 rgba(120,214,255,.2);
  animation:popIn .4s cubic-bezier(.5,1.8,.5,1) backwards;
}
.board-row:nth-child(1){animation-delay:.05s;border-left-color:var(--brand-yellow);background:#FFFBE6}
.board-row:nth-child(2){animation-delay:.12s;border-left-color:var(--brand-pink)}
.board-row:nth-child(3){animation-delay:.19s;border-left-color:var(--brand-mint)}
.board-rank{font-weight:800;font-size:22px;margin-right:12px;min-width:52px}
.board-name{flex:1;font-weight:700;text-align:left}
.board-score{font-weight:800;color:var(--brand-orange);font-size:20px}
.board-row.rank-1 .board-rank{color:#FFB300}
.board-row.rank-2 .board-rank{color:#9AA0B5}
.board-row.rank-3 .board-rank{color:#CD7F32}

.action-btn{
  margin-top:22px;
  background:linear-gradient(180deg,var(--brand-mint),#2FD38F);
  color:var(--brand-dark);font-size:20px;font-weight:800;
  border:none;border-radius:18px;padding:14px 34px;cursor:pointer;
  font-family:'Jua',sans-serif;letter-spacing:.5px;
  box-shadow:0 5px 0 #17A869,0 6px 14px rgba(47,211,143,.35);
  transition:transform .1s;
}
.action-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #17A869}

.empty-hint{color:#BFB8D6;text-align:center;padding:30px 10px;font-size:15px}

/* 스크롤바 커스텀 */
.player-list::-webkit-scrollbar{width:8px}
.player-list::-webkit-scrollbar-track{background:transparent}
.player-list::-webkit-scrollbar-thumb{background:var(--brand-sky);border-radius:4px}
</style>
</head>
<body>
<div id="wrapper">
  <canvas id="gameCanvas"></canvas>

  <!-- 로비 -->
  <div id="lobby">
    <div class="lobby-box">
      <div class="lobby-header">
        <span class="lobby-emoji">🧻</span>
        <div class="lobby-title">휴지 슛!</div>
        <span class="lobby-emoji">💦</span>
      </div>
      <div class="lobby-subtitle">꼬깔콘 휴지로 콧물을 쏙! · 타이밍 리듬 액션</div>

      <div class="player-list" id="playerList">
        <div class="empty-hint">👇 아래에 이름을 입력하고 <b>+</b> 버튼을 눌러보세요</div>
      </div>

      <div class="input-row">
        <input id="nameInput" type="text" maxlength="10" placeholder="플레이어 닉네임 입력!" inputmode="text" autocomplete="off">
        <button id="addBtn" title="-add">+</button>
      </div>

      <div class="start-row">
        <button id="clearBtn">초기화</button>
        <button id="startBtn" disabled>🎮게임 시작</button>
      </div>

      <div class="hint">✨ 1명부터 플레이 가능 · 한글/영어 입력 가능 · 최대 8명</div>
    </div>
  </div>

  <!-- 턴 전환 -->
  <div id="turnOverlay" class="overlay hidden">
    <div class="turn-card">
      <div id="turnPrevName" style="font-size:18px;color:var(--brand-pink);margin-bottom:6px"></div>
      <div id="turnPrevScore" style="font-size:56px;font-weight:800;color:var(--brand-orange);margin-bottom:6px;text-shadow:0 3px 0 rgba(255,154,60,.25)"></div>
      <div id="turnPrevCo" style="font-size:16px;color:var(--brand-dark);opacity:.7;margin-bottom:22px"></div>
      <div style="font-size:18px;color:var(--brand-dark);opacity:.75;margin-bottom:4px">다음 플레이어</div>
      <div id="turnNextName" style="font-size:46px;font-weight:800;color:var(--brand-dark);margin:6px 0 22px;text-shadow:0 3px 0 rgba(120,214,255,.35)"></div>
      <button id="turnNextBtn" class="action-btn">👆 시작!</button>
      <div id="turnOrder" style="margin-top:14px;font-size:13px;color:#9890B5"></div>
    </div>
  </div>

  <!-- 최종 순위 -->
  <div id="boardOverlay" class="overlay hidden">
    <div class="board-card">
      <div class="board-title">🏆 최종 순위 🏆</div>
      <div id="boardList"></div>
      <button id="boardAgainBtn" class="action-btn">🔄 다시하기</button>
    </div>
  </div>
</div>
<script src="game.js"></script>
</body>
</html>
